<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <title>Contact-Lisakhanya Mateane</title>
    <style>
       *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
       }

       .contact-me{
        background: url('Background.png');
        background-size: cover;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 40px;

       }
       .contact-me h1{
         font-family: 'Cinzel', serif;
            font-size: 40px;
            color: rgb(222,153,184);
            text-align: center;
            letter-spacing: 0.08em;
            margin-bottom: 25px;
       }
        .divider {
            color: rgb(216, 116, 133);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            margin-bottom: 60px;
            text-shadow: 0 0 8px rgb(216, 116, 133);
        }

        .divider span {
            width: 120px;
            height: 2px;
            background-color: rgb(216, 116, 133);
            display: block;
        }
        .contacts-grid{
            display: flex;
            flex-direction: row;
            margin-bottom: 30px;
            justify-content: center;
             gap: 24px;
             width: 100%;
        }
        .contact-card{
            background-color: rgb(35,25,35);
            border: 1px solid rgb(186,108,143);
            width: 250px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        .contact-card:hover{
            background-color: rgb(182, 80, 97);  /* FIX 7: was missing rgb() */
        }
        .card-icon{
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgb(192, 96, 112);
            background-color: rgb(239,174,203);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        
        }
        .card-label{
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: rgb(222,153,184);
            letter-spacing: 0.12em;
            text-align: center;

        }
           .card-sub {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: rgb(245, 230, 238);
            letter-spacing: 0.08em;
            text-align: center;
            word-break: break-all;       /* stops long emails from overflowing */
        }
         .cv-card {
            background-color: rgb(45,32,45);
            border: 1px solid rgb(186,108,143);
            padding: 18px 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
         .cv-card:hover {
            background-color: rgb(182, 80, 97);
        }
          .cv-label {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: rgb(222,153,184);
            letter-spacing: 0.14em;
            font-weight: 600;
        }
         @media (max-width: 768px) {
            .cards-row {
                flex-direction: column;      /* stack cards on mobile */
                align-items: center;
            }

            .contact-card {
                width: 100%;
                max-width: 300px;
            }

            .cv-card {
                padding: 18px 40px;
            }
        }

    </style>
    <body>
    <div class="contact-me">
        <h1>Contact</h1>

        <div class="divider">
            <span></span>
                 ◆
            <span></span>
        </div>

        <div class="contacts-grid">
            <!--Email-->
            <a class="contact-card" href="lisakhanyamateane@gmail.com">
                <div class="card-icon">✉️</div>
                <div class="card-label">Email</div>
                <div class="card-sub">lisakhanyamateane@gmail.com</div>
            </a>
            <!--linked in-->
            <a class="contact-card" href="https://www.linkedin.com/in/lisakhanya-mateane-798936422/">
                <div class="card-icon">💼</div>
                <div class="card-label">LinkedIn</div>
                <div class="card-sub">linkedin.com/in/Lisakhanya Mateane</div>
            </a>
            <!--Github-->
            <a class="contact-card" href="https://github.com/lisamateane">
                <div class="card-icon">🐙</div>
                <div class="card-label">Github</div>
                <div class="card-sub">github.com/your-Lisa Mateane</div>
            </a>

        </div>
            <!--cv-->
            <a class="cv-card" href="CV of Lisakhanya Thandile Mateane.pdf" download>
                <span class="cv-label">Download CV</span>
            </a>
    </div>
    </body>
</head>
</html>
